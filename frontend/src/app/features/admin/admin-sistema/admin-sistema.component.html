<app-page-header
  title="Configuración del sistema"
  subtitle="Modo de operación del tenant (actualmente: normal)"
  icon="settings"
/>

<mat-card class="sistema-card">
  <mat-card-header>
    <mat-card-title>Modo de sistema</mat-card-title>
    <mat-card-subtitle>El sistema opera en modo normal por defecto</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="mode-options">
      <mat-radio-group [value]="selectedMode()" (change)="onModeChange($event.value)">
        <mat-radio-button value="normal">Normal</mat-radio-button>
      </mat-radio-group>
    </div>
    <div class="mode-help">
      <p><strong>Normal:</strong> Experiencia genérica. Tareas, proyectos, catálogos y tablero estándar.</p>
    </div>
    <div class="apply-actions">
      <button
        mat-flat-button
        color="primary"
        (click)="applyMode()"
        [disabled]="selectedMode() === currentMode || !connectivity.isOnline()"
      >
        Aplicar modo
      </button>
    </div>
  </mat-card-content>
</mat-card>
