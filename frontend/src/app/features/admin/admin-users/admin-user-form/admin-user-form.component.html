<nav class="breadcrumb">
  <a routerLink="/admin">Administración</a>
  <span> / </span>
  <a routerLink="/admin/usuarios">Usuarios</a>
  <span> / {{ isEditMode ? 'Editar' : 'Nuevo' }}</span>
</nav>

<app-page-header
  [title]="isEditMode ? 'Editar usuario' : 'Nuevo usuario'"
  [subtitle]="isEditMode ? 'Actualiza datos en MySQL' : 'Se creará un Contact operativo vinculado'"
  [icon]="isEditMode ? 'person' : 'person_add'"
/>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" class="user-form" (ngSubmit)="save()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre para mostrar</mat-label>
        <input matInput formControlName="displayName" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Correo electrónico</mat-label>
        <input matInput type="email" formControlName="email" [readonly]="isEditMode" />
        @if (isEditMode) {
          <mat-hint>No editable en esta fase</mat-hint>
        }
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Rol</mat-label>
        <mat-select formControlName="role">
          @for (r of roles; track r) {
            <mat-option [value]="r">{{ roleLabels[r] }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      @if (!isEditMode) {
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña inicial (opcional)</mat-label>
          <input matInput type="password" formControlName="password" />
          <mat-hint>Si se deja vacío se usa GamoraTemp123!</mat-hint>
        </mat-form-field>
      }

      <div class="actions">
        <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || saving() || !connectivity.isOnline()">
          {{ isEditMode ? 'Guardar' : 'Crear usuario' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
