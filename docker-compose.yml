services:
  mysql:
    image: mysql:8.4
    container_name: gamora-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gamora_bot_dev
      MYSQL_USER: gamora
      MYSQL_PASSWORD: gamora_dev
    ports:
      - "3306:3306"
    volumes:
      - gamora_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gamora_mysql_data:
